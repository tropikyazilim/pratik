services:
  # Git güncellemelerini otomatik çek
  git-pull:
    image: alpine/git
    container_name: git_puller
    volumes:
      - .:/repo
    working_dir: /repo
    environment:
      - GIT_REPO_URL=https://github.com/tropikyazilim/pratik.git
    command: sh -c "git remote set-url origin $${GIT_REPO_URL} && git pull origin main && echo 'Git güncellemeleri çekildi'"
    networks:
      - pratik_network

  database:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: pratik_db
    environment:
      POSTGRES_DB: pratik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devbros123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - pratik_network

  backend:
    build: 
      context: ./b
      dockerfile: Dockerfile
    container_name: pratik_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:devbros123@database:5432/pratik
      PORT: 3000
      DB_HOST: database
      DB_USER: postgres
      DB_PASSWORD: devbros123
      DB_NAME: pratik
      DB_PORT: 5432
      CORS_ORIGIN: https://pratik.volkankok.dev
    expose:
      - "3000"
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - pratik_network

  frontend:
    build:
      context: ./f
      dockerfile: Dockerfile
    container_name: pratik_frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pratik_network

  nginx:
    image: nginx:alpine
    container_name: pratik_nginx
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - pratik_network

volumes:
  postgres_data:

networks:
  pratik_network:
    driver: bridge
